services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3
    container_name: woodpecker-server
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - woodpecker-server-data:/var/lib/woodpecker/
    environment:
      - WOODPECKER_OPEN=true
      - WOODPECKER_HOST=${WOODPECKER_HOST}
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}
      - WOODPECKER_GITHUB=true
      - WOODPECKER_GITHUB_URL=https://github.com
      - WOODPECKER_GITHUB_CLIENT=${WOODPECKER_GITHUB_CLIENT:?set WOODPECKER_GITHUB_CLIENT in .env}
      - WOODPECKER_GITHUB_SECRET=${WOODPECKER_GITHUB_SECRET:?set WOODPECKER_GITHUB_SECRET in .env}

volumes:
  woodpecker-server-data:
